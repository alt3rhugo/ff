# Per-batch settings override (native facefusion.ini format).
# Passed to every headless run via --config-path. Edit per batch; these settings
# apply to the whole batch (not per combination). The face_swapper_model below
# also decides the output filename suffix letter (a / b / c / in).

[processors]
processors = face_swapper face_enhancer
face_swapper_model = hyperswap_1b_256
face_swapper_pixel_boost = 512x512
face_swapper_weight = 0.15
face_enhancer_model = gpen_bfr_512
face_enhancer_blend = 65
face_enhancer_weight = 0.65

[face_selector]
face_selector_mode = one

[face_detector]
face_detector_score = 0.65
face_detector_angles = 0 90 270

[face_landmarker]
face_landmarker_score = 0.65

[face_masker]
face_mask_blur = 0.65
# face_mask_types: use "box" alone for clips where the face is covered by hands,
# objects, or fluid AND you want the swap to paint over them. Adding "occlusion"
# keeps whatever is in front of the face UNswapped (the XSeg occluder excludes
# those pixels) — on heavily-covered clips that suppresses almost the whole swap,
# so the output looks unswapped. Only add "occlusion" when the target face is
# mostly clear and you want passing hands/objects to stay visible.
face_mask_types = box
